name: Build & Upload APK

on:
  # Trigger manually from the GitHub Actions UI ("Run workflow" button)
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      upload_to_drive:
        description: 'Upload APK to Google Drive'
        required: true
        default: true
        type: boolean

  # Auto-build (debug only) on every push to main — no Drive upload
  push:
    branches: [ main ]

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Locate APK
        id: apk
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          else
            APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          fi
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "name=$(basename $APK)" >> $GITHUB_OUTPUT
          echo "size=$(du -sh $APK | cut -f1)" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      # ── Upload to GitHub as artifact (always) ──────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: remnd-${{ github.event.inputs.build_type || 'debug' }}-build${{ github.run_number }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      # ── Upload to Google Drive (manual trigger only, when opted in) ─────────
      - name: Upload to Google Drive
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_drive == 'true' }}
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          pip install --quiet google-api-python-client google-auth-httplib2 google-auth-oauthlib

          python3 - <<'PYEOF'
          import os, json, sys
          from pathlib import Path
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          creds_json = os.environ.get("GDRIVE_CREDENTIALS")
          if not creds_json:
              print("GDRIVE_SERVICE_ACCOUNT_JSON secret not set — skipping Drive upload.")
              sys.exit(0)

          creds_info = json.loads(creds_json)
          scopes = ["https://www.googleapis.com/auth/drive.file"]
          creds = service_account.Credentials.from_service_account_info(creds_info, scopes=scopes)
          service = build("drive", "v3", credentials=creds)

          folder_name = "remnd-builds"
          query = f"name='{folder_name}' and mimeType='application/vnd.google-apps.folder' and trashed=false"
          results = service.files().list(q=query, fields="files(id)").execute()
          files = results.get("files", [])
          if files:
              folder_id = files[0]["id"]
          else:
              meta = {"name": folder_name, "mimeType": "application/vnd.google-apps.folder"}
              folder_id = service.files().create(body=meta, fields="id").execute()["id"]
              print(f"Created Drive folder '{folder_name}'")

          apk_path = "${{ steps.apk.outputs.path }}"
          apk_name = "${{ steps.apk.outputs.name }}"
          file_meta = {"name": apk_name, "parents": [folder_id]}
          media = MediaFileUpload(apk_path, mimetype="application/vnd.android.package-archive")
          uploaded = service.files().create(body=file_meta, media_body=media, fields="id,webViewLink").execute()

          print(f"Uploaded to Google Drive!")
          print(f"Link: {uploaded.get('webViewLink', 'N/A')}")
          PYEOF

      - name: Summary
        run: |
          echo "## Build complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **APK** | ${{ steps.apk.outputs.name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | ${{ steps.apk.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Artifact** | [Download](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
